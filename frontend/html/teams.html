<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Your teams - Allegro</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Keep this before CSS so the saved theme is applied before first paint.
			try {
				if (localStorage.getItem('theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {
				/* localStorage unavailable */
			}
		</script>
		<link rel="stylesheet" href="../css/global.css" />
		<link rel="stylesheet" href="../css/teams.css" />
	</head>
	<body>
		<header class="topbar">
			<div class="brand">
				<div class="logo"></div>
				<span class="name">Allegro</span>
			</div>
			<div class="user-menu">
				<button class="btn ghost icon theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme"></button>
				<!-- User avatar + sign-out dropdown (wired in user-menu.js) -->
				<div class="user-switch" id="user-switch">
					<button
						type="button"
						class="avatar user-avatar"
						id="user-avatar"
						aria-haspopup="true"
						aria-expanded="false"
						title="Account"
					></button>
					<div class="user-dropdown" id="user-dropdown" role="menu">
						<button type="button" class="item" id="sign-out-btn" role="menuitem">Sign out</button>
					</div>
				</div>
			</div>
		</header>

		<main>
			<div class="hero">
				<div>
					<h1>Your teams</h1>
				</div>
				<div class="hero-actions">
					<!--Commenting out until implemented-->
					<!--<button class="btn">Join with code</button>-->
					<button class="btn primary" id="create-team">+ New team</button>
				</div>
			</div>

			<div class="search-row">
				<input class="input" placeholder="Search teams…" />

				<!-- Unified Sorting Dropdown UI -->
				<div style="position: relative">
					<button class="btn" id="sort-teams-trigger">Sort: recent ▾</button>
					<div class="user-dropdown" id="sort-teams-menu" style="min-width: 160px; right: 0">
						<div class="sort-item active"><span class="circle"></span> Recent</div>
						<div class="sort-item"><span class="circle"></span> Alphabetical</div>
						<div class="sort-item"><span class="circle"></span> Activity</div>
					</div>
				</div>
			</div>

			<div class="grid" id="team-grid">
				<button class="team new" id="create-team-2">
					<div>
						<div class="plus">+</div>
						<h2>Create new team</h2>
						<p class="new-team-caption">Start a fresh workspace.</p>
					</div>
				</button>
			</div>

			<section class="invites" id="invites-section">
				<h3>Pending invitations</h3>
			</section>
		</main>

		<div class="backdrop" id="create-backdrop">
			<div class="modal">
				<div class="modal-head">
					<h3>Create a new team</h3>
					<p>You'll be the first member. Invite others after.</p>
				</div>
				<div class="modal-body">
					<div class="field">
						<label>Team name <span class="req">*</span></label>
						<input class="input" id="team-name" placeholder="e.g. Roost Robotics" />
					</div>
					<div class="field">
						<label>Short bio <span class="optional-label">(optional)</span></label>
						<textarea class="textarea" id="team-bio" placeholder="What does this team work on?"></textarea>
					</div>
				</div>
				<div class="modal-foot">
					<button class="btn" id="cancel-create">Cancel</button>
					<button class="btn primary" id="confirm-create">Create team</button>
				</div>
			</div>
		</div>

		<div class="toast" id="toast"></div>

		<script src="../js/theme.js"></script>
		<!-- Shared topbar user menu (avatar dropdown, sign out) -->
		<script type="module" src="../js/user-menu.js"></script>
		<script type="module" src="../js/teams.js"></script>
	</body>
</html>
