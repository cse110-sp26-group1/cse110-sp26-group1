<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Sign in - Allegro</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				if (localStorage.getItem('theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {
				/* localStorage unavailable */
			}
		</script>
		<link rel="stylesheet" href="../css/global.css" />
		<link rel="stylesheet" href="../css/login.css" />
	</head>
	<body class="mode-login">
		<div class="stage">
			<div class="inner">
				<div class="brand">
					<div class="logo" aria-hidden="true"></div>
					<span class="name">Allegro</span>
					<!--<span class="ver">v0.1</span>-->
					<!--<button
						class="btn ghost icon theme-toggle login-theme-toggle"
						id="themeToggle"
						aria-label="Toggle theme"
						title="Toggle theme"
					></button>
				-->
				</div>

				<h1 class="title login-only">Welcome back</h1>
				<h1 class="title signup-only">Create your account</h1>
				<p class="sub login-only">Sign in to continue to your teams.</p>
				<p class="sub signup-only">A few details and you're in.</p>

				<div class="tabs-seg" role="tablist">
					<button id="tabLogin" class="on" role="tab" aria-selected="true">Sign in</button>
					<button id="tabSignup" role="tab" aria-selected="false">Sign up</button>
				</div>

				<form id="authForm" novalidate>
					<div class="signup-only row2">
						<div class="field">
							<label for="first">First name</label>
							<input id="first" class="input" type="text" placeholder="Ada" autocomplete="given-name" />
						</div>
						<div class="field">
							<label for="last">Last name</label>
							<input id="last" class="input" type="text" placeholder="Lovelace" autocomplete="family-name" />
						</div>
					</div>

					<div class="field">
						<label for="email">Email</label>
						<input id="email" class="input" type="email" placeholder="you@studio.dev" autocomplete="email" required />
					</div>

					<div class="field">
						<label for="password">Password</label>
						<input id="password" class="input" type="password" placeholder="••••••••" autocomplete="current-password" required />
					</div>
					<!--Comment out Forgot Password for now-->
					<!--
					<div class="help-row login-only">
						<label class="remember-label"> <input type="checkbox" /> Remember me </label>
						<a href="#">Forgot password?</a>
					</div>
					-->
					<button class="btn primary block" id="submitBtn" type="submit">
						<span class="login-only">Sign in</span>
						<span class="signup-only">Create account</span>
					</button>

					<!--<div class="or"><span>or continue with</span></div>-->
					<!--Commenting out Google for now, may be added later-->
					<!--
					<div class="social">
						<button type="button" class="btn goog">Google</button>
					</div>
					-->

					<!-- Do we need this? We dont have Terms of Service or Privacy Policy links -->
					<!--<div class="legal">By continuing you agree to the Terms of Service and Privacy Policy.</div>-->
				</form>
			</div>
		</div>
