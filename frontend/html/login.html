<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Sign in - Allegro</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				if (localStorage.getItem('theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {
				/* localStorage unavailable */
			}
		</script>
		<link rel="stylesheet" href="../css/global.css" />
		<link rel="stylesheet" href="../css/login.css" />
	</head>
	<body>
		<div class="stage">
			<div class="inner">
				<div class="brand">
					<div class="logo" aria-hidden="true"></div>
					<span class="name">Allegro</span>
				</div>

				<h1 class="title">Welcome back</h1>
				<p class="sub">Sign in to continue to your teams.</p>

				<form id="auth-form" novalidate>
					<div class="field">
						<label for="email">Email</label>
						<input id="email" class="input" type="email" placeholder="you@studio.dev" autocomplete="email" required />
					</div>

					<div class="field">
						<label for="password">Password</label>
						<input id="password" class="input" type="password" placeholder="••••••••" autocomplete="current-password" required />
					</div>

					<button class="btn primary block" id="submit-btn" type="submit">Sign in</button>

					<p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
				</form>
			</div>
		</div>
		<aside class="poster" aria-hidden="true"></aside>
		<script src="../js/theme.js"></script>
		<script type="module" src="../js/login.js"></script>
	</body>
</html>
