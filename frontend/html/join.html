<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Pending invitations - Allegro</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Keep this before CSS so the saved theme is applied before first paint.
			try {
				if (localStorage.getItem('theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {
				/* localStorage unavailable */
			}
		</script>
		<link rel="stylesheet" href="../css/global.css" />
		<link rel="stylesheet" href="../css/teams.css" />
		<link rel="stylesheet" href="../css/join.css" />
	</head>
	<body>
		<header class="topbar">
			<div class="brand">
				<a href="teams.html"><div class="logo"></div></a>
				<span class="name">Allegro</span>
			</div>
			<div class="user-menu">
				<button class="btn ghost icon theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme"></button>
				<div class="user-switch" id="user-switch">
					<button
						type="button"
						class="avatar user-avatar"
						id="user-avatar"
						aria-haspopup="true"
						aria-expanded="false"
						title="Account"
					></button>
					<div class="user-dropdown" id="user-dropdown" role="menu">
						<button type="button" class="item" id="sign-out-btn" role="menuitem">Sign out</button>
					</div>
				</div>
			</div>
		</header>

		<main>
			<div class="hero">
				<div>
					<h1>Pending invitations</h1>
					<p>Accept or decline invitations from team admins.</p>
				</div>
				<div class="hero-actions">
					<a href="teams.html" class="btn">← Back to teams</a>
				</div>
			</div>

			<div id="join-loading" class="join-state">Loading invitations…</div>

			<div id="join-empty" class="join-state" hidden>
				<div class="join-empty-icon">✉</div>
				<p id="join-empty-msg">You have no pending invitations.</p>
				<a href="teams.html" class="btn primary" style="margin-top: 12px">Go to your teams</a>
			</div>

			<div id="join-error" class="join-state" hidden>
				<p>Failed to load invitations. Please try again.</p>
				<button class="btn" id="retry-btn" style="margin-top: 12px">Retry</button>
			</div>

			<section class="invites" id="invite-list" hidden></section>
		</main>

		<div class="toast" id="toast"></div>

		<script src="../js/theme.js"></script>
		<script type="module" src="../js/user-menu.js"></script>
		<script type="module" src="../js/join.js"></script>
	</body>
</html>
