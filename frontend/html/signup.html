<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Create account - Allegro</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				if (localStorage.getItem('theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {
				/* localStorage unavailable */
			}
		</script>
		<link rel="stylesheet" href="../css/global.css" />
		<link rel="stylesheet" href="../css/login.css" />
	</head>
	<body>
		<div class="stage">
			<div class="inner">
				<div class="brand">
					<div class="logo" aria-hidden="true"></div>
					<span class="name">Allegro</span>
				</div>

				<h1 class="title">Create an Account</h1>
				<p class="sub">A few details and you're in.</p>

				<form id="auth-form" novalidate>
					<div class="row2">
						<div class="field">
							<label for="first-name">First name</label>
							<input id="first-name" class="input" type="text" placeholder="Ada" autocomplete="given-name" required />
						</div>
						<div class="field">
							<label for="last-name">Last name</label>
							<input id="last-name" class="input" type="text" placeholder="Lovelace" autocomplete="family-name" required />
						</div>
					</div>
					<div class="field">
						<label for="username">Username</label>
						<input id="username" class="input" type="text" placeholder="ada_lovelace" autocomplete="username" required />
					</div>

					<div class="field">
						<label for="email">Email</label>
						<input id="email" class="input" type="email" placeholder="you@studio.dev" autocomplete="email" required />
					</div>

					<div class="field">
						<label for="password">Password</label>
						<div class="password-wrapper">
							<input
								id="password"
								class="input password-input"
								type="password"
								placeholder="••••••••"
								autocomplete="new-password"
								required
							/>
							<button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
								<svg
									class="password-toggle-icon password-toggle-icon-show"
									xmlns="http://www.w3.org/2000/svg"
									width="16"
									height="16"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
									aria-hidden="true"
								>
									<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</svg>
								<svg
									class="password-toggle-icon password-toggle-icon-hide"
									xmlns="http://www.w3.org/2000/svg"
									width="16"
									height="16"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
									aria-hidden="true"
								>
									<path
										d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
									></path>
									<line x1="1" y1="1" x2="23" y2="23"></line>
								</svg>
							</button>
						</div>
					</div>

					<button class="btn primary block" id="submit-btn" type="submit">Create account</button>

					<p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
				</form>
			</div>
		</div>
		<aside class="poster" aria-hidden="true"></aside>
		<script src="../js/theme.js"></script>
		<script type="module" src="../js/signup.js"></script>
	</body>
</html>
