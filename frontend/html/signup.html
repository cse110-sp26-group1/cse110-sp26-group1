<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Create account - Allegro</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				if (localStorage.getItem('theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {
				/* localStorage unavailable */
			}
		</script>
		<link rel="stylesheet" href="../css/global.css" />
		<link rel="stylesheet" href="../css/login.css" />
	</head>
	<body>
		<div class="stage">
			<div class="inner">
				<div class="brand">
					<div class="logo" aria-hidden="true"></div>
					<span class="name">Allegro</span>
				</div>

				<h1 class="title">Create your account</h1>
				<p class="sub">A few details and you're in.</p>

				<form id="authForm" novalidate>
					<div class="row2">
						<div class="field">
							<label for="first">First name</label>
							<input id="first" class="input" type="text" placeholder="Ada" autocomplete="given-name" required />
						</div>
						<div class="field">
							<label for="last">Last name</label>
							<input id="last" class="input" type="text" placeholder="Lovelace" autocomplete="family-name" required />
						</div>
					</div>
					<div class="field">
						<label for="username">Username</label>
						<input id="username" class="input" type="text" placeholder="ada_lovelace" autocomplete="username" required />
					</div>

					<div class="field">
						<label for="email">Email</label>
						<input id="email" class="input" type="email" placeholder="you@studio.dev" autocomplete="email" required />
					</div>

					<div class="field">
						<label for="password">Password</label>
						<input id="password" class="input" type="password" placeholder="••••••••" autocomplete="password" required />
					</div>

					<button class="btn primary block" id="submitBtn" type="submit">Create account</button>

					<p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
				</form>
			</div>
		</div>
		<aside class="poster" aria-hidden="true"></aside>
		<script src="../js/theme.js"></script>
		<script type="module" src="../js/signup.js"></script>
	</body>
</html>
